<mat-toolbar color="primary">
  <span>Admin Dashboard</span>

  <span class="spacer"></span>

  <button
    mat-raised-button
    color="warn"
    (click)="logout()">

    Logout

  </button>
</mat-toolbar>

<div class="container">

  <mat-card>

    <h2>Create User</h2>

    <form
      [formGroup]="userForm"
      (ngSubmit)="createUser()">

      <mat-form-field appearance="outline">

        <mat-label>Name</mat-label>

        <input
          matInput
          formControlName="name" />

      </mat-form-field>

      <mat-form-field appearance="outline">

        <mat-label>Email</mat-label>

        <input
          matInput
          formControlName="email" />

      </mat-form-field>

      <mat-form-field appearance="outline">

        <mat-label>Password</mat-label>

        <input
          matInput
          type="password"
          formControlName="password" />

      </mat-form-field>

      <mat-form-field appearance="outline">

        <mat-label>Role</mat-label>

        <mat-select formControlName="role">

          <mat-option value="USER">
            USER
          </mat-option>

        </mat-select>

      </mat-form-field>

      <button
        mat-raised-button
        color="primary">

        Create User

      </button>

    </form>

  </mat-card>

  <mat-card>

    <h2>Create Task</h2>

    <form
      [formGroup]="taskForm"
      (ngSubmit)="createTask()">

      <mat-form-field appearance="outline">

        <mat-label>Title</mat-label>

        <input
          matInput
          formControlName="title" />

      </mat-form-field>

      <mat-form-field appearance="outline">

        <mat-label>Description</mat-label>

        <textarea
          matInput
          formControlName="description"></textarea>

      </mat-form-field>

      <mat-form-field appearance="outline">

        <mat-label>Assign User</mat-label>

        <mat-select
          formControlName="assignedToId">

          <mat-option
            *ngFor="let user of users"
            [value]="user.id">

            {{ user.name }}

          </mat-option>

        </mat-select>

      </mat-form-field>

      <button
        mat-raised-button
        color="accent">

        Create Task

      </button>

    </form>

  </mat-card>

  <mat-card>

    <h2>All Tasks</h2>

    <table
      mat-table
      [dataSource]="tasks">

      <ng-container matColumnDef="title">

        <th mat-header-cell *matHeaderCellDef>
          Title
        </th>

        <td mat-cell *matCellDef="let task">
          {{ task.title }}
        </td>

      </ng-container>

      <ng-container
        matColumnDef="description">

        <th mat-header-cell *matHeaderCellDef>
          Description
        </th>

        <td mat-cell *matCellDef="let task">
          {{ task.description }}
        </td>

      </ng-container>

      <ng-container matColumnDef="status">

        <th mat-header-cell *matHeaderCellDef>
          Status
        </th>

        <td mat-cell *matCellDef="let task">
          {{ task.status }}
        </td>

      </ng-container>

      <ng-container
        matColumnDef="assignedTo">

        <th mat-header-cell *matHeaderCellDef>
          Assigned To
        </th>

        <td mat-cell *matCellDef="let task">
          {{ task.assignedTo.name }}
        </td>

      </ng-container>

      <tr
        mat-header-row
        *matHeaderRowDef="displayedColumns">
      </tr>

      <tr
        mat-row
        *matRowDef="let row; columns: displayedColumns">
      </tr>

    </table>

  </mat-card>

</div>
