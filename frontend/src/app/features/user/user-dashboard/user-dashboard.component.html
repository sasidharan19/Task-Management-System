<mat-toolbar color="primary">

  <span>User Dashboard</span>

  <span class="spacer"></span>

  <button
    mat-raised-button
    color="warn"
    (click)="logout()">

    Logout

  </button>

</mat-toolbar>

<div class="container">

  <mat-card>

    <h2>My Tasks</h2>

    <table
      mat-table
      [dataSource]="tasks">

      <ng-container matColumnDef="title">

        <th mat-header-cell *matHeaderCellDef>
          Title
        </th>

        <td mat-cell *matCellDef="let task">
          {{ task.title }}
        </td>

      </ng-container>

      <ng-container matColumnDef="description">

        <th mat-header-cell *matHeaderCellDef>
          Description
        </th>

        <td mat-cell *matCellDef="let task">
          {{ task.description }}
        </td>

      </ng-container>

      <ng-container matColumnDef="status">

        <th mat-header-cell *matHeaderCellDef>
          Status
        </th>

        <td mat-cell *matCellDef="let task">
          {{ task.status }}
        </td>

      </ng-container>

      <ng-container matColumnDef="update">

        <th mat-header-cell *matHeaderCellDef>
          Update Status
        </th>

        <td mat-cell *matCellDef="let task">

          <mat-select
            [(value)]="task.status">

            <mat-option
              *ngFor="let status of statuses"
              [value]="status">

              {{ status }}

            </mat-option>

          </mat-select>

          <button
            mat-raised-button
            color="primary"
            class="update-btn"
            (click)="updateStatus(task)">

            Update

          </button>

        </td>

      </ng-container>

      <tr
        mat-header-row
        *matHeaderRowDef="displayedColumns">
      </tr>

      <tr
        mat-row
        *matRowDef="let row; columns: displayedColumns">
      </tr>

    </table>

  </mat-card>

</div>
